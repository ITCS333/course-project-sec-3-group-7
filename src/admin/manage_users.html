<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        header h1 { font-size: 1.2rem; font-weight: 700; }
        header .badge {
            background: rgba(255,255,255,.2);
            border: 1px solid rgba(255,255,255,.3);
            font-size: .72rem;
            font-weight: 600;
            padding: .25rem .7rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        /* ── LAYOUT ── */
        main { max-width: 1000px; margin: 2rem auto; padding: 0 1.2rem 3rem; }

        /* ── CARDS ── */
        .section-card {
            background: #fff;
            border-radius: 16px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 8px rgba(0,0,0,.04);
        }
        .section-card h2 {
            font-size: 1.05rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1.2rem;
            padding-bottom: .7rem;
            border-bottom: 2px solid #ede9fe;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* ── FORMS ── */
        fieldset { border: none; padding: 0; }
        legend { display: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
        .form-group { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .9rem; }
        label { font-size: .8rem; font-weight: 600; color: #475569; }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            padding: .6rem .9rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-size: .88rem;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            width: 100%;
        }
        input:focus, select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,.13);
            background: #fff;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .6rem 1.3rem;
            border-radius: 9px;
            border: none;
            font-size: .87rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .15s;
        }
        .btn:hover  { transform: translateY(-1px); }
        .btn:active { transform: none; }
        .btn-primary   { background: #4f46e5; color: #fff; }
        .btn-primary:hover { background: #4338ca; }
        .btn-success   { background: #059669; color: #fff; }
        .btn-success:hover { background: #047857; }

        /* ── DETAILS ── */
        details { border: 1.5px solid #e2e8f0; border-radius: 12px; overflow: hidden; margin-bottom: .5rem; }
        details summary {
            padding: .8rem 1.1rem;
            cursor: pointer;
            font-weight: 600;
            font-size: .9rem;
            background: #f8fafc;
            color: #4f46e5;
            list-style: none;
            user-select: none;
        }
        details summary::-webkit-details-marker { display: none; }
        details summary::before { content: '＋ '; }
        details[open] summary::before { content: '－ '; }
        details > form, details > div { padding: 1.2rem 1.1rem; }

        /* ── SEARCH ── */
        .search-wrap { position: relative; margin-bottom: 1rem; }
        .search-wrap input {
            padding-left: 2.2rem;
        }
        .search-wrap::before {
            content: '🔍';
            position: absolute;
            left: .7rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: .85rem;
            pointer-events: none;
        }

        /* ── TABLE ── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: #f8fafc; }
        th {
            padding: .7rem .9rem;
            font-size: .8rem;
            font-weight: 700;
            color: #475569;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        th:hover { color: #4f46e5; }
        th::after { content: ' ↕'; opacity: .4; font-size: .7rem; }
        td {
            padding: .7rem .9rem;
            font-size: .88rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        /* ── ACTION BUTTONS ── */
        .edit-btn, .delete-btn {
            padding: .3rem .75rem;
            border-radius: 7px;
            border: none;
            font-size: .78rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        .edit-btn   { background: #e0e7ff; color: #3730a3; margin-right: .3rem; }
        .edit-btn:hover   { background: #c7d2fe; }
        .delete-btn { background: #fee2e2; color: #991b1b; }
        .delete-btn:hover { background: #fecaca; }

        /* ── BADGE ── */
        .badge-yes { background: #d1fae5; color: #065f46; padding: .2rem .6rem; border-radius: 50px; font-size: .75rem; font-weight: 600; }
        .badge-no  { background: #f1f5f9; color: #64748b; padding: .2rem .6rem; border-radius: 50px; font-size: .75rem; font-weight: 600; }

        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
    <script src="manage_users.js" defer></script>
</head>
<body>

<header>
    <h1>⚙️ Admin Portal</h1>
    <span class="badge">ITCS333</span>
</header>

<main>

    <!-- Section 1: Password Management -->
    <section class="section-card">
        <h2>🔒 Change Your Password</h2>
        <form action="#" id="password-form">
            <fieldset>
                <legend>Password Update</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="current-password">Current Password</label>
                        <input type="password" id="current-password" name="current-password" required placeholder="Current password">
                    </div>
                    <div></div>
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" name="new-password" minlength="8" required placeholder="Min. 8 characters">
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm New Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" required placeholder="Repeat new password">
                    </div>
                </div>
                <button type="submit" id="change" class="btn btn-primary">Update Password</button>
            </fieldset>
        </form>
    </section>

    <!-- Section 2: User Management -->
    <section class="section-card">
        <h2>👥 Manage Users</h2>

        <!-- Add New User (collapsible) -->
        <details>
            <summary>Add New User</summary>
            <form action="#" id="add-user-form">
                <fieldset>
                    <legend>New User Information</legend>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="user-name">Full Name</label>
                            <input type="text" id="user-name" name="user-name" required placeholder="Full name">
                        </div>
                        <div class="form-group">
                            <label for="user-email">Email Address</label>
                            <input type="email" id="user-email" name="user-email" required placeholder="user@example.com">
                        </div>
                        <div class="form-group">
                            <label for="default-password">Default Password</label>
                            <input type="password" id="default-password" name="default-password" minlength="8" required placeholder="Min. 8 characters">
                        </div>
                        <div class="form-group">
                            <label for="is-admin">Role</label>
                            <select id="is-admin" name="is-admin">
                                <option value="0">Student</option>
                                <option value="1">Admin</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="add" class="btn btn-success">Add User</button>
                </fieldset>
            </form>
        </details>

        <!-- User List -->
        <h3 style="font-size:.9rem; font-weight:600; color:#475569; margin: 1.2rem 0 .7rem;">Registered Users</h3>

        <div class="search-wrap">
            <input type="text" id="search-input" placeholder="Search by name or email...">
        </div>

        <div class="table-wrap">
            <table id="user-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Admin</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
            </table>
        </div>
    </section>

</main>
</body>
</html>
