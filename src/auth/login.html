<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ede9fe 0%, #e0e7ff 100%);
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 2.5rem 2.2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(79,70,229,.12);
        }

        .brand { text-align: center; margin-bottom: 1.8rem; }
        .brand-icon { font-size: 2.2rem; }
        .brand h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-top: .4rem; }
        .brand p  { font-size: .88rem; color: #64748b; margin-top: .3rem; }

        fieldset { border: none; padding: 0; }
        legend { display: none; }

        .field { margin-bottom: 1.1rem; }
        label { display: block; font-size: .83rem; font-weight: 600; color: #374151; margin-bottom: .4rem; }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: .7rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: .93rem;
            color: #1e293b;
            background: #f8fafc;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
        }
        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,.15);
            background: #fff;
        }

        button[type="submit"] {
            width: 100%;
            padding: .8rem;
            background: #4f46e5;
            color: #fff;
            font-size: .95rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: .4rem;
            transition: background .2s, transform .15s;
        }
        button[type="submit"]:hover  { background: #4338ca; transform: translateY(-1px); }
        button[type="submit"]:active { transform: translateY(0); }

        #message-container {
            margin-top: .9rem;
            padding: .65rem 1rem;
            border-radius: 8px;
            font-size: .87rem;
            font-weight: 500;
            min-height: 1.6rem;
        }
        #message-container.success { background: #d1fae5; color: #065f46; }
        #message-container.error   { background: #fee2e2; color: #991b1b; }

        .back-link { text-align: center; margin-top: 1.2rem; font-size: .84rem; color: #64748b; }
        .back-link a { color: #4f46e5; text-decoration: none; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand">
            <div class="brand-icon">🔐</div>
            <h1>Welcome Back!</h1>
            <p>Sign in to your ITCS333 account</p>
        </div>

        <form id="login-form" action="#">
            <fieldset>
                <legend>Secure Login</legend>

                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="8" placeholder="Min. 8 characters">
                </div>

                <button type="submit" id="login">Log In</button>
            </fieldset>

            <div id="message-container"></div>
        </form>

        <p class="back-link"><a href="../../index.html">← Back to Home</a></p>
    </div>

    <script src="login.js" defer></script>
</body>
</html>
